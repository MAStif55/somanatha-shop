name: Deploy to Firebase

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [trigger-deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Create .env.local from secrets
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}" >> .env.local
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env.local
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env.local
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env.local
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env.local
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env.local
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env.local
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env.local
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env.local

      - name: Build Next.js (static export)
        run: npm run build

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project somanatha-shop --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project somanatha-shop --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json
